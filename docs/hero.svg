<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" role="img" aria-labelledby="t d">
  <title id="t">tg-account-mcp</title>
  <desc id="d">MCP server wrapping Telethon for personal Telegram accounts. 38 tools.</desc>

  <defs>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#ff3366"/>
      <stop offset="0.5" stop-color="#ff9966"/>
      <stop offset="1"   stop-color="#6633ff"/>
    </linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6633ff"/>
      <stop offset="1" stop-color="#00e5ff"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff3366"/>
      <stop offset="1" stop-color="#ff9966"/>
    </linearGradient>
    <linearGradient id="planeFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset="1" stop-color="#6633ff"/>
    </linearGradient>
    <linearGradient id="planeFold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6633ff"/>
      <stop offset="1" stop-color="#0a0708"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.05"/>
    </pattern>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff3366" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#ff3366" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="360" fill="#0a0708"/>
  <rect width="1280" height="360" fill="url(#grid)"/>
  <ellipse cx="340" cy="200" rx="520" ry="180" fill="url(#glow)"/>

  <!-- top sweep stripe (shifted, tilted) -->
  <polygon points="0,40 1280,40 1280,82 0,114" fill="url(#sweep)" opacity="0.92"/>
  <polygon points="0,114 1280,82 1280,86 0,118" fill="#0a0708" opacity="0.55"/>

  <!-- bottom cool stripe -->
  <polygon points="0,316 80,300 1280,316 1280,360 0,360" fill="url(#cool)" opacity="0.4"/>

  <!-- left + right rails with end dots -->
  <g stroke="#ff3366" stroke-opacity="0.45" stroke-width="1">
    <line x1="60" y1="64"  x2="60" y2="296"/>
    <line x1="1220" y1="64" x2="1220" y2="296"/>
  </g>
  <g fill="#ff3366">
    <circle cx="60"   cy="64"  r="3"/>
    <circle cx="60"   cy="296" r="3"/>
    <circle cx="1220" cy="64"  r="3"/>
    <circle cx="1220" cy="296" r="3"/>
  </g>

  <!-- dotted message-trail rising into the plane -->
  <g fill="#ff9966" fill-opacity="0.85">
    <circle cx="820"  cy="260" r="2"/>
    <circle cx="848"  cy="248" r="2.4"/>
    <circle cx="876"  cy="234" r="2.8"/>
    <circle cx="906"  cy="218" r="3.2"/>
    <circle cx="938"  cy="200" r="3.6"/>
    <circle cx="972"  cy="180" r="4"/>
  </g>

  <!-- paper-plane (cleaner geometry, two folds) -->
  <g transform="translate(986 134)">
    <!-- main body -->
    <path d="M 0 56 L 220 0 L 132 130 L 96 96 Z" fill="url(#planeFace)"/>
    <!-- fold underside (darker) -->
    <path d="M 0 56 L 96 96 L 76 132 Z" fill="url(#planeFold)" opacity="0.95"/>
    <!-- bright crease highlight -->
    <path d="M 0 56 L 220 0 L 96 96 Z" fill="#ffffff" fill-opacity="0.06"/>
    <!-- tail flame -->
    <path d="M 96 96 L 132 130 L 110 116 Z" fill="#00e5ff"/>
  </g>

  <!-- two stacked chat bubbles, top-right corner -->
  <g transform="translate(958 70)" stroke-width="2" fill="none">
    <path d="M 0 0 H 56 A 8 8 0 0 1 64 8 V 28 A 8 8 0 0 1 56 36 H 18 L 6 46 V 36 H 0 Z"
          stroke="#ff9966" stroke-opacity="0.85"/>
  </g>
  <g transform="translate(896 38)" stroke-width="2" fill="none">
    <path d="M 0 0 H 38 A 6 6 0 0 1 44 6 V 22 A 6 6 0 0 1 38 28 H 14 L 6 36 V 28 H 0 Z"
          stroke="#ff3366" stroke-opacity="0.7"/>
  </g>

  <!-- title -->
  <text x="100" y="222"
        font-family="'Inter','SF Pro Display','Helvetica Neue',Arial,sans-serif"
        font-weight="900" font-size="104" letter-spacing="-3.5"
        fill="#ffffff">tg-account-mcp</text>

  <!-- thin underline-accent under title -->
  <rect x="100" y="234" width="190" height="3" fill="url(#warm)"/>

  <!-- subtitle line -->
  <text x="100" y="266"
        font-family="'JetBrains Mono','Fira Code','Menlo',monospace"
        font-size="13" letter-spacing="6" font-weight="500"
        fill="#ff3366">M C P  ·  T E L E T H O N  ·  3 8   T O O L S</text>

  <!-- version chip -->
  <g transform="translate(1102 60)">
    <rect x="0" y="0" width="86" height="24" rx="2" fill="url(#warm)"/>
    <text x="43" y="16"
          font-family="'JetBrains Mono','Fira Code','Menlo',monospace"
          font-size="12" letter-spacing="3" font-weight="700"
          fill="#0a0708" text-anchor="middle">v 0.2.0</text>
  </g>

  <!-- bottom category strip -->
  <text x="100" y="336"
        font-family="'JetBrains Mono','Fira Code','Menlo',monospace"
        font-size="11" letter-spacing="3"
        fill="#ffffff" fill-opacity="0.55">
    MEDIA · BOTS · INLINE BUTTONS · REACTIONS · PIN · FORWARD · TYPING · PRESENCE
  </text>

  <!-- right-side decorative dotted column -->
  <g fill="#6633ff" fill-opacity="0.5">
    <circle cx="1180" cy="170" r="1.6"/>
    <circle cx="1180" cy="186" r="1.6"/>
    <circle cx="1180" cy="202" r="1.6"/>
    <circle cx="1180" cy="218" r="1.6"/>
    <circle cx="1180" cy="234" r="1.6"/>
    <circle cx="1180" cy="250" r="1.6"/>
  </g>
</svg>
