name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install detect-secrets pip-audit

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Run tests
        run: pytest -q

      - name: Detect secrets
        run: |
          detect-secrets scan --exclude-files '\.venv/.*' --list > /tmp/detected.txt
          if [ -s /tmp/detected.txt ]; then
            echo "Potential secrets found:"
            cat /tmp/detected.txt
            exit 1
          fi

      - name: Pip audit
        run: pip-audit --strict --desc on
